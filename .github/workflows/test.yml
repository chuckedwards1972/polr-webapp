name: HOPE Platform Tests

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run Tests
        id: run_tests
        run: node tests/hope.test.js
        continue-on-error: true

      - name: Show Results
        run: |
          echo '## HOPE Platform Test Results' >> $GITHUB_STEP_SUMMARY
          cat evolution/last-results.json >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Update Memory
        run: node evolution/memory-engine.js
        continue-on-error: true

      - name: Commit Memory Update
        run: |
          git config user.name 'hope-test-engine'
          git config user.email 'tests@hopenetwork.com'
          git add evolution/
          git diff --staged --quiet || git commit -m 'Test run memory update'
          git push
        continue-on-error: true

      - name: Fail if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1