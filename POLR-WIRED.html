<script>
const API = 'https://polr-backend-production.up.railway.app/api';

const SCRIPTURE_VERSIONS = ['KJV','NKJV','NIV','ESV','NASB','AMP','MSG'];

const SYSTEM_ACCOUNTS = {
  'POLARPA':{password:'ACTS2:38',level:0,name:'Chuck Edwards',title:'Director of Platform & Technology',campus:'All'},
  'POLRTTD':{password:'ACTS2:38',level:0,name:'Chuck Edwards',title:'Director of Platform & Technology',campus:'All'},
  'POLRHQ':{password:'ACTS2:38',level:1,name:'Jeff Walthers',title:'Executive Director',campus:'All'},
  'jeff.walthers':{password:'POLR2024!',level:1,name:'Jeff Walthers',title:'Executive Director',campus:'All'},
};

const LEVEL_META = {
  0:{label:'Platform Owner',color:'#d4a853',bg:'rgba(212,168,83,0.12)'},
  1:{label:'HQ Admin',color:'#8b7cf8',bg:'rgba(139,124,248,0.12)'},
  2:{label:'Regional Director',color:'#3b9ef5',bg:'rgba(59,158,245,0.12)'},
  3:{label:'Campus Director',color:'#e8704a',bg:'rgba(232,112,74,0.12)'},
  4:{label:'House Manager',color:'#2ec4a0',bg:'rgba(46,196,160,0.12)'},
  5:{label:'Staff',color:'#5bc46e',bg:'rgba(91,196,110,0.12)'},
  6:{label:'Member',color:'#8899b0',bg:'rgba(136,153,176,0.12)'},
};

let SESSION = null;
let ACTIVE_SECTION = 'overview';
let SIDEBAR_COLLAPSED = false;
let MOBILE_MENU_OPEN = false;
let SCRIPTURE_PREF = localStorage.getItem('polr_scripture_version') || 'KJV';
let INSTALL_PROMPT = null;

// PWA Install prompt
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  INSTALL_PROMPT = e;
  const btn = document.getElementById('install-btn');
  if (btn) btn.style.display = 'block';
});

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// Toast
function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// Auth
function getToken() { return localStorage.getItem('polr_token') || sessionStorage.getItem('polr_token'); }
function setToken(t, remember) {
  if (remember) localStorage.setItem('polr_token', t);
  else sessionStorage.setItem('polr_token', t);
}
function clearAuth() {
  localStorage.removeItem('polr_token');
  localStorage.removeItem('polr_user');
  sessionStorage.removeItem('polr_token');
  SESSION = null;
}

function getSavedSession() {
  try { return JSON.parse(localStorage.getItem('polr_user') || 'null'); } catch { return null; }
}

async function doLogin(username, password, remember) {
  // Try Railway backend first
  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    if (res.ok) {
      const data = await res.json();
      setToken(data.token, remember);
      localStorage.setItem('polr_user', JSON.stringify(data.user));
      return data.user;
    }
  } catch(e) {}

  // Fallback to system accounts
  const sys = SYSTEM_ACCOUNTS[username] || SYSTEM_ACCOUNTS[username?.toUpperCase()];
  if (sys && sys.password === password) {
    const user = {id:'local',username,level:sys.level,firstName:sys.name.split(' ')[0],lastName:sys.name.split(' ')[1],tenantId:'polr',campusId:null,...sys};
    localStorage.setItem('polr_user', JSON.stringify(user));
    return user;
  }
  throw new Error('Invalid username or password');
}

async function apiFetch(path, opts={}) {
  const token = getToken();
  const res = await fetch(`${API}${path}`, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      ...(token ? {'Authorization': `Bearer ${token}`} : {}),
      ...(opts.headers || {}),
    },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `Error ${res.status}`);
  }
  return res.json();
}

function savePrayer() {
  const body = document.getElementById('prayer-body')?.value.trim();
  const anon = document.getElementById('prayer-anon')?.checked;
  if (!body) { toast('Please write your prayer request.', 'error'); return; }
  const prayers = JSON.parse(localStorage.getItem('polr_prayers') || '[]');
  prayers.push({id:Date.now(),body,anon,date:new Date().toISOString()});
  localStorage.setItem('polr_prayers', JSON.stringify(prayers));
  toast('Prayer request submitted!', 'success');
  setSection('prayer');
}

async function createUser() {
  const username = document.getElementById('new-username')?.value.trim();
  const password = document.getElementById('new-password')?.value;
  const firstName = document.getElementById('new-firstname')?.value.trim();
  const lastName = document.getElementById('new-lastname')?.value.trim();
  const email = document.getElementById('new-email')?.value.trim();
  const level = parseInt(document.getElementById('new-level')?.value);
  if (!username || !password) { toast('Username and password required.', 'error'); return; }
  try {
    await apiFetch('/admin/users', {method:'POST', body:{username,password,first_name:firstName,last_name:lastName,email,level}});
    toast('User created!', 'success');
    document.getElementById('add-user-form').innerHTML = '';
    loadUsers();
  } catch(e) { toast(e.message || 'Failed to create user.', 'error'); }
}

async function runHealthCheck() {
  const el = document.getElementById('health-result');
  if (el) el.innerHTML = '<div style="color:var(--dmuted);">Checking...</div>';
  try {
    const data = await fetch(`${API}/health`).then(r => r.json());
    if (el) el.innerHTML = `<div style="padding:0.75rem;background:rgba(46,196,160,0.08);border:1px solid rgba(46,196,160,0.2);border-radius:var(--r);">
      <div style="color:var(--success);font-weight:600;margin-bottom:0.5rem;">All Systems Operational</div>
      <div style="font-size:0.78rem;color:var(--dmuted);font-family:var(--font-mono);">Status: ${data.status} | DB: ${data.database} | v${data.version}</div>
    </div>`;
  } catch(e) {
    if (el) el.innerHTML = `<div style="padding:0.75rem;background:rgba(252,129,129,0.08);border:1px solid rgba(252,129,129,0.2);border-radius:var(--r);color:var(--danger);">Health check failed. Check connection.</div>`;
  }
}

function setSection(id) {
  ACTIVE_SECTION = id;
  const el = document.getElementById('section-content');
  if (el) { el.innerHTML = renderSection(id); el.scrollTop = 0; }
  document.querySelectorAll('.d-nav-item').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick')?.includes("'" + id + "'"));
  });
  document.querySelectorAll('.bn-item').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick')?.includes("'" + id + "'"));
  });
  window.scrollTo(0,0);
  if (LOADERS[id]) setTimeout(() => LOADERS[id](), 100);
}
