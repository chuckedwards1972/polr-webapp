<script>
const API = 'https://polr-backend-production.up.railway.app/api';

const SCRIPTURE_VERSIONS = ['KJV','NKJV','NIV','ESV','NASB','AMP','MSG'];

const SYSTEM_ACCOUNTS = {
  'POLARPA':{password:'ACTS2:38',level:0,name:'Chuck Edwards',title:'Director of Platform & Technology',campus:'All'},
  'POLRTTD':{password:'ACTS2:38',level:0,name:'Chuck Edwards',title:'Director of Platform & Technology',campus:'All'},
  'POLRHQ':{password:'ACTS2:38',level:1,name:'Jeff Walthers',title:'Executive Director',campus:'All'},
  'jeff.walthers':{password:'POLR2024!',level:1,name:'Jeff Walthers',title:'Executive Director',campus:'All'},
};

const LEVEL_META = {
  0:{label:'Platform Owner',color:'#d4a853',bg:'rgba(212,168,83,0.12)'},
  1:{label:'HQ Admin',color:'#8b7cf8',bg:'rgba(139,124,248,0.12)'},
  2:{label:'Regional Director',color:'#3b9ef5',bg:'rgba(59,158,245,0.12)'},
  3:{label:'Campus Director',color:'#e8704a',bg:'rgba(232,112,74,0.12)'},
  4:{label:'House Manager',color:'#2ec4a0',bg:'rgba(46,196,160,0.12)'},
  5:{label:'Staff',color:'#5bc46e',bg:'rgba(91,196,110,0.12)'},
  6:{label:'Member',color:'#8899b0',bg:'rgba(136,153,176,0.12)'},
};

let SESSION = null;
let ACTIVE_SECTION = 'overview';
let SIDEBAR_COLLAPSED = false;
let MOBILE_MENU_OPEN = false;
let SCRIPTURE_PREF = localStorage.getItem('polr_scripture_version') || 'KJV';
let INSTALL_PROMPT = null;

// PWA Install prompt
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  INSTALL_PROMPT = e;
  const btn = document.getElementById('install-btn');
  if (btn) btn.style.display = 'block';
});

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// Toast
function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// Auth
function getToken() { return localStorage.getItem('polr_token') || sessionStorage.getItem('polr_token'); }
function setToken(t, remember) {
  if (remember) localStorage.setItem('polr_token', t);
  else sessionStorage.setItem('polr_token', t);
}
function clearAuth() {
  localStorage.removeItem('polr_token');
  localStorage.removeItem('polr_user');
  sessionStorage.removeItem('polr_token');
  SESSION = null;
}

function getSavedSession() {
  try { return JSON.parse(localStorage.getItem('polr_user') || 'null'); } catch { return null; }
}

async function doLogin(username, password, remember) {
  // Try Railway backend first
  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    if (res.ok) {
      const data = await res.json();
      setToken(data.token, remember);
      localStorage.setItem('polr_user', JSON.stringify(data.user));
      return data.user;
    }
  } catch(e) {}

  // Fallback to system accounts
  const sys = SYSTEM_ACCOUNTS[username] || SYSTEM_ACCOUNTS[username?.toUpperCase()];
  if (sys && sys.password === password) {
    const user = {id:'local',username,level:sys.level,firstName:sys.name.split(' ')[0],lastName:sys.name.split(' ')[1],tenantId:'polr',campusId:null,...sys};
    localStorage.setItem('polr_user', JSON.stringify(user));
    return user;
  }
  throw new Error('Invalid username or password');
}

async function apiFetch(path, opts={}) {
  const token = getToken();
  const res = await fetch(`${API}${path}`, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      ...(token ? {'Authorization': `Bearer ${token}`} : {}),
      ...(opts.headers || {}),
    },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `Error ${res.status}`);
  }
  return res.json();
}

async function handleLogin() {

  const password = document.getElementById('login-pass').value;
  const remember = document.getElementById('login-remember').checked;
  const btn = document.getElementById('login-btn');

  if (!username || !password) { showLoginError('Please enter your username and password.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="login-spinner"></span>Signing in...';

  try {
    SESSION = await doLogin(username, password, remember);

    btn.innerHTML = 'Sign In to Platform';

function renderUsers() {

async function loadUsers() {
  const el = document.getElementById('users-list');
  if (!el) return;
  try {
    const users = await apiFetch('/admin/users');
    if (!users.length) { el.textContent = 'No users found.'; return; }
    el.outerHTML = `<div style="overflow-x:auto;"><table class="tbl">
      <thead><tr><th>Username</th><th>Name</th><th>Level</th><th>Campus</th><th>Status</th></tr></thead>
      <tbody>${users.map(u => { const lm = LEVEL_META[u.level]||LEVEL_META[6]; return `<tr>
        <td style="font-family:var(--font-mono);font-size:0.82rem;">${u.username}</td>
        <td>${u.first_name||''} ${u.last_name||''}</td>
        <td><span class="badge" style="background:${lm.bg};color:${lm.color};">L${u.level} ${lm.label}</span></td>
        <td style="font-size:0.78rem;color:var(--dmuted);">${u.campus_name||'All'}</td>
        <td><span class="badge ${u.is_active?'badge-green':'badge-red'}">${u.is_active?'Active':'Inactive'}</span></td>
      </tr>`; }).join('')}</tbody>
    </table></div>`;
  } catch(e) { if (el) el.textContent = 'Could not load users.'; }
}

async function loadAudit() {
  const el = document.getElementById('audit-list');
  if (!el) return;
  try {
    const logs = await apiFetch('/admin/audit-log?limit=50');
    if (!logs.length) { el.textContent = 'No audit entries.'; return; }
    el.outerHTML = `<div style="overflow-x:auto;"><table class="tbl">
      <thead><tr><th>Time</th><th>User</th><th>Action</th><th>Entity</th></tr></thead>
      <tbody>${logs.map(l => `<tr>
        <td style="font-size:0.72rem;color:var(--dmuted);font-family:var(--font-mono);">${new Date(l.created_at).toLocaleString()}</td>
        <td style="font-size:0.78rem;">${l.username||'—'}</td>
        <td><span class="badge badge-blue" style="font-size:0.6rem;">${l.action}</span></td>
        <td style="font-size:0.78rem;color:var(--dmuted);">${l.entity_type||'—'}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  } catch(e) {}
}

// ═══════════════════════════════════════════════════
// ASYNC LOADERS — called after section renders
// ═══════════════════════════════════════════════════
const LOADERS = {
  'overview': loadDashboardStats,
  'lms': loadLMSSteps,
  'members': loadMembers,
  'housing': loadHousing,
  'workforce': loadEmployers,
  'financial': loadFinancial,
  'donations': loadDonations,
  'users': loadUsers,
  'campuses': loadCampuses,
  'audit': loadAudit,
};

function setSection(id) {
  ACTIVE_SECTION = id;
  const el = document.getElementById('section-content');
  if (el) { el.innerHTML = renderSection(id); el.scrollTop = 0; }
  document.querySelectorAll('.d-nav-item').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick')?.includes("'" + id + "'"));
  });
  document.querySelectorAll('.bn-item').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick')?.includes("'" + id + "'"));
  });
  window.scrollTo(0,0);
  if (LOADERS[id]) setTimeout(() => LOADERS[id](), 100);
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
render();
setTimeout(() => {
  if (SESSION && LOADERS[ACTIVE_SECTION]) LOADERS[ACTIVE_SECTION]();
}, 300);
