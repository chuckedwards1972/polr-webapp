<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>POLR Network</title><style>*{box-sizing:border-box;margin:0;padding:0;}body{background:#0c1a2e;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;}.card{background:rgba(10,17,32,0.95);border:1px solid rgba(200,145,58,0.3);border-radius:16px;padding:2rem;width:90%;max-width:380px;}h1{color:#e8aa55;font-size:1.5rem;text-align:center;margin-bottom:1.5rem;}input{width:100%;padding:0.75rem;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:white;font-size:16px;margin-bottom:1rem;outline:none;}.btn{width:100%;padding:0.85rem;background:#c8913a;border:none;border-radius:8px;color:#0c1a2e;font-size:1rem;font-weight:700;cursor:pointer;}.err{color:#fc8181;text-align:center;margin-top:0.75rem;font-size:0.85rem;}</style></head><body><div class="card"><h1>POLR Network</h1><input id="u" placeholder="Username" autocapitalize="none"><input id="p" type="password" placeholder="Password"><button class="btn" onclick="login()">Sign In</button><div class="err" id="e"></div></div><script>const A={"POLR":"ACTS2:38","POLARPA":"ACTS2:38","POLRTTD":"ACTS2:38","POLRHQ":"ACTS2:38"};function login(){const u=document.getElementById("u").value.trim(),p=document.getElementById("p").value;if(A[u.toUpperCase()]===p){localStorage.setItem("polr_token","local_token");localStorage.setItem("polr_user",JSON.stringify({username:u.toUpperCase(),level:0,firstName:"Chuck",lastName:"Edwards",tenantId:"polr",campusId:null}));window.location.href="POLR-WIRED.html";}else{document.getElementById("e").textContent="Invalid credentials.";}}document.getElementById("p").addEventListener("keydown",e=>{if(e.key==="Enter")login();});</script></body></html>
