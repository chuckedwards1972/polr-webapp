<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1f2e">
<title>POLR Network â€” Path of Life Recovery</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0f1f2e;
    --navy-mid: #1a3c5e;
    --gold: #c8a951;
    --gold-light: #e2c97e;
    --cream: #f5f0e8;
    --white: #ffffff;
    --text-muted: rgba(255,255,255,0.55);
    --error: #e05252;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    min-height: -webkit-fill-available;
    position: relative;
    overflow-y: auto;
    overflow-x: hidden;
  }

  /* Background cross pattern */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,169,81,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,169,81,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Radial glow */
  body::after {
    content: '';
    position: absolute;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(26,60,94,0.6) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    margin: 1rem;
    padding: 2.5rem 2rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(200,169,81,0.2);
    border-radius: 16px;
    backdrop-filter: blur(12px);
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-wrap {
    text-align: center;
    margin-bottom: 2rem;
  }

  .emblem {
    display: inline-block;
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.1em;
    line-height: 1;
    margin-bottom: 0.5rem;
    border: 2px solid rgba(200,169,81,0.4);
    border-radius: 50%;
    width: 56px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 0.75rem;
  }

  .logo-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 600;
    color: var(--white);
    letter-spacing: 0.05em;
    line-height: 1;
  }

  .logo-title span {
    color: var(--gold);
  }

  .logo-sub {
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 0.4rem;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200,169,81,0.3), transparent);
    margin: 1.5rem 0;
  }

  .form-group {
    margin-bottom: 1rem;
  }

  label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.4rem;
  }

  input {
    width: 100%;
    padding: 0.85rem 1rem;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    -webkit-appearance: none;
  }

  input:focus {
    border-color: rgba(200,169,81,0.5);
    background: rgba(255,255,255,0.09);
  }

  input::placeholder {
    color: rgba(255,255,255,0.25);
  }

  /* Fix iOS zoom on input focus */
  @media (max-width: 768px) {
    input { font-size: 16px; }
  }

  .btn {
    width: 100%;
    padding: 0.95rem;
    margin-top: 0.5rem;
    background: var(--gold);
    border: none;
    border-radius: 8px;
    color: var(--navy);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    min-height: 48px;
  }

  .btn:hover { background: var(--gold-light); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .error-msg {
    display: none;
    margin-top: 1rem;
    padding: 0.75rem 1rem;
    background: rgba(224,82,82,0.12);
    border: 1px solid rgba(224,82,82,0.3);
    border-radius: 8px;
    color: #f08080;
    font-size: 0.85rem;
    text-align: center;
  }

  .error-msg.show { display: block; }

  .scripture {
    margin-top: 1.5rem;
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.85rem;
    font-style: italic;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(15,31,46,0.3);
    border-top-color: var(--navy);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="card">
  <div class="logo-wrap">
    <div class="emblem">P</div>
    <div class="logo-title"><span>POLR</span> Network</div>
    <div class="logo-sub">Path of Life Recovery</div>
  </div>

  <div class="divider"></div>

  <div class="form-group">
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter username" autocomplete="username" autocapitalize="none" spellcheck="false">
  </div>

  <div class="form-group">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
  </div>

  <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>

  <div class="error-msg" id="errorMsg"></div>

  <div class="scripture">
    "I can do all things through Christ which strengtheneth me."<br>
    â€” Philippians 4:13
  </div>
</div>

<script>
  const API = 'https://polr-backend-production.up.railway.app/api';
const LOCAL_ACCOUNTS = {'POLARPA':'ACTS2:38','POLR':'ACTS2:38','POLRTTD':'ACTS2:38','POLRL1':'ACTS2:38','POLRL2':'ACTS2:38','POLRL3':'ACTS2:38','POLRL4':'ACTS2:38','POLRL5':'ACTS2:38','POLRL6':'ACTS2:38'};

  // Allow Enter key to submit
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');

    document.getElementById('errorMsg').classList.remove('show');

    if (!username || !password) {
      showError('Please enter your username and password.');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in...';

    // Check local accounts first (always works offline)
    if (LOCAL_ACCOUNTS[username] === password || LOCAL_ACCOUNTS[username.toUpperCase()] === password) {
      const uname = username.toUpperCase();
      localStorage.setItem('polr_token', 'local_token');
      localStorage.setItem('polr_user', JSON.stringify({
        username: uname, level:0,
        firstName:'Chuck', lastName:'Edwards',
        tenantId:'polr', campusId:null
      }));
      window.location.href = 'POLR-WIRED-ENHANCED.html';
      return;
    }

    // Try Railway backend
    try {
      const res = await fetch(API + '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) {
        showError(data.message || 'Invalid credentials. Please try again.');
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
        return;
      }
      localStorage.setItem('polr_token', data.token);
      localStorage.setItem('polr_user', JSON.stringify(data.user));
      sessionStorage.setItem('polr_session', JSON.stringify({name: (data.user.firstName||data.user.username)+' '+(data.user.lastName||''), level: data.user.level, username: data.user.username, role: 'staff', ts: Date.now()}));
      window.location.href = 'POLR-WIRED-ENHANCED.html';
    } catch (err) {
      showError('Invalid username or password. Please try again.');
      btn.disabled = false;
      btn.innerHTML = 'Sign In';
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('loginBtn').disabled = false;
    document.getElementById('loginBtn').innerHTML = 'Sign In';
  }

  // Auto-focus username on desktop
  if (window.innerWidth > 768) {
    document.getElementById('username').focus();
  }

  // Check if already logged in
  const token = localStorage.getItem('polr_token');
  if (token) {
    window.location.href = 'POLR-WIRED-ENHANCED.html';
  }
</script>
</body>
</html>
